<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMIRK Web Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/esm/ort.webgpu.min.js",
      "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.10/vision_bundle.mjs"
    }
  }
  </script>
</head>
<body>
  <header>
    <h1>SMIRK Web Demo</h1>
    <div id="filter-controls">
      <label>
        <span>mincutoff</span>
        <input id="filter-mincutoff" type="range" min="0.1" max="10" step="0.1" value="1.0" />
        <span id="filter-mincutoff-value" class="value">1.0</span>
        <span class="unit">Hz</span>
      </label>
      <label>
        <span>beta</span>
        <input id="filter-beta" type="range" min="0" max="1" step="0.005" value="0.05" />
        <span id="filter-beta-value" class="value">0.050</span>
      </label>
    </div>
    <div id="status">loading&hellip;</div>
  </header>
  <main>
    <section class="pane">
      <h2>Webcam</h2>
      <div class="canvas-wrap">
        <video id="cam" autoplay playsinline muted></video>
        <canvas id="video-overlay"></canvas>
      </div>
    </section>
    <section class="pane">
      <h2>SMIRK output</h2>
      <div class="canvas-wrap">
        <canvas id="three"></canvas>
        <canvas id="debug-crop" width="224" height="224" title="model input"></canvas>
      </div>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
